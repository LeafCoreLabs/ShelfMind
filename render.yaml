# ShelfMind — Render Blueprint
# Deploy: Render Dashboard → New → Blueprint → connect LeafCoreLabs/ShelfMind
# Docs: https://render.com/docs/infrastructure-as-code

services:
  - type: web
    name: shelfmind-api
    runtime: docker
    plan: free
    region: oregon
    rootDir: backend
    healthCheckPath: /api/health
    dockerCommand: gunicorn app.main:app -k uvicorn.workers.UvicornWorker -b 0.0.0.0:$PORT -w 1 --timeout 120
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: shelfmind-db
          property: connectionString
      - key: DATABASE_URL_SYNC
        fromDatabase:
          name: shelfmind-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: shelfmind-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: keyvalue
          name: shelfmind-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: keyvalue
          name: shelfmind-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: GROQ_BASE_URL
        value: https://api.groq.com/openai/v1

  - type: web
    name: shelfmind-web
    runtime: static
    plan: free
    region: oregon
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: shelfmind-api
          envVarKey: RENDER_EXTERNAL_URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: keyvalue
    name: shelfmind-redis
    plan: free
    region: oregon
    ipAllowList:
      - source: 0.0.0.0/0
        description: everywhere

databases:
  - name: shelfmind-db
    plan: free
    region: oregon
    databaseName: shelfmind
